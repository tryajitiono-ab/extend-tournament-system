<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <!-- Bracket visualization library (local copy) -->
    <link rel="stylesheet" href="/static/lib/brackets-viewer.min.css" />
    <link rel="stylesheet" href="/static/css/bracket-theme.css">
    <script type="text/javascript" src="/static/lib/brackets-viewer.min.js"></script>
</head>
<body>
    <main class="container">
        <!-- Back link -->
        <p><a href="/tournaments">← Back to Tournaments</a></p>

        <!-- Error banner (hidden by default) -->
        <div id="error-banner" style="display: none;" role="alert">
            <strong>Failed to load tournament.</strong>
            <button id="retry-btn">Retry</button>
        </div>

        <!-- Loading state -->
        <div id="loading-state">
            <p aria-busy="true">Loading tournament...</p>
        </div>

        <!-- Tournament info container -->
        <div id="tournament-info" style="display: none;">
            <!-- Tournament Header -->
            <div class="tournament-header">
                <h1 id="tournament-name"></h1>
                <p id="tournament-description"></p>
                <div class="info-grid">
                    <div class="info-card">
                        <label>Status</label>
                        <span id="tournament-status"></span>
                    </div>
                    <div class="info-card">
                        <label>Participants</label>
                        <strong id="tournament-participants"></strong>
                    </div>
                    <div class="info-card">
                        <label>Created</label>
                        <strong id="tournament-created"></strong>
                    </div>
                </div>
            </div>

            <!-- Participants Section -->
            <div class="section-header">
                <h2>Participants</h2>
            </div>

            <!-- Participant loading state -->
            <div id="participant-loading" style="display: none;">
                <p aria-busy="true">Loading participants...</p>
            </div>

            <!-- Participant list -->
            <div id="participant-list" class="participants-list">
                <!-- Participant items will be inserted here -->
            </div>

            <!-- Empty participants state -->
            <div id="participant-empty" style="display: none;">
                <p>No participants registered yet.</p>
            </div>

            <!-- Bracket Section -->
            <section id="bracket-section" style="display: none;">
                <h2>Tournament Bracket</h2>
                
                <!-- Loading state -->
                <div id="bracket-loading" style="display: none;">
                    <p aria-busy="true">Loading bracket...</p>
                </div>
                
                <!-- Error state (non-critical) -->
                <div id="bracket-error" style="display: none; color: #757575;">
                    <!-- Error message inserted here -->
                </div>
                
                <!-- Bracket container - brackets-viewer.js renders here -->
                <div id="bracket-container" class="brackets-viewer" style="display: none; overflow-x: auto;">
                    <!-- Bracket rendered by brackets-viewer.js -->
                </div>
                
                <!-- Large tournament mobile warning -->
                <div id="bracket-mobile-warning" style="display: none;">
                    <p><small>💡 Desktop recommended for best viewing experience with 32+ participants</small></p>
                </div>
            </section>
        </div>
    </main>

    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/bracket-adapter.js"></script>
    <script src="/static/js/tournament-detail.js"></script>
</body>
</html>
