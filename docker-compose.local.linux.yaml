services:
  mongodb:
    image: mongo:8.0
    platform: linux/amd64/v8
    network_mode: host
    ports:
      - "27017:27017"
    healthcheck:
      test: |
        mongosh --eval "
        try {
          rs.status();
        } catch(e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
        }
        db.runCommand({ ping: 1 });
        "
      interval: 10s
      retries: 10
      start_period: 40s
      timeout: 10s
