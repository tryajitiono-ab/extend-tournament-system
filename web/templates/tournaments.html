<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments</title>
    <link rel="stylesheet" href="/static/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <div>
                <h1>Tournaments</h1>
                <p style="margin: 0; color: var(--pico-muted-color);">Browse and manage tournament competitions</p>
            </div>
            <button id="refresh-btn" style="margin: 0;">🔄 Refresh</button>
        </div>

        <!-- Error banner (hidden by default) -->
        <div id="error-banner" style="display: none;" role="alert">
            <p>Failed to load tournaments.</p>
            <button id="retry-btn">Retry</button>
        </div>

        <!-- Loading state -->
        <div id="loading-state">
            <p aria-busy="true">Loading tournaments...</p>
        </div>

        <!-- Tournament list container -->
        <div id="tournament-list">
            <!-- Cards will be inserted here by JavaScript -->
        </div>

        <!-- Empty state (hidden by default) -->
        <div id="empty-state" style="display: none;">
            <p>No tournaments</p>
        </div>
    </main>

    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/tournaments.js"></script>
</body>
</html>
