syntax = "proto3";

option csharp_namespace = "AccelByte.Extend.ServiceExtension";
option go_package = "accelbyte.net/extend/serviceextension";
option java_package = "net.accelbyte.extend.serviceextension";
option java_multiple_files = true;

package tournament;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "permission.proto";

enum TournamentStatus {
  TOURNAMENT_STATUS_UNSPECIFIED = 0;
  TOURNAMENT_STATUS_DRAFT = 1;
  TOURNAMENT_STATUS_ACTIVE = 2;
  TOURNAMENT_STATUS_STARTED = 3;
  TOURNAMENT_STATUS_COMPLETED = 4;
  TOURNAMENT_STATUS_CANCELLED = 5;
}

message TournamentParticipant {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
}

message Participant {
  string participant_id = 1 [(google.api.field_behavior) = REQUIRED];
  string user_id = 2 [(google.api.field_behavior) = REQUIRED];
  string username = 3 [(google.api.field_behavior) = OPTIONAL];
  string display_name = 4 [(google.api.field_behavior) = OPTIONAL];
  string tournament_id = 5 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp registered_at = 6 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp updated_at = 7 [(google.api.field_behavior) = OPTIONAL];
}

message Tournament {
  string tournament_id = 1;
  string name = 2;
  string description = 3;
  int32 max_participants = 4;
  int32 current_participants = 5;
  TournamentStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  google.protobuf.Timestamp start_time = 9;
  google.protobuf.Timestamp end_time = 10;
}

message CreateTournamentRequest {
  string namespace = 1;
  string name = 2;
  string description = 3;
  int32 max_participants = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
}

message CreateTournamentResponse {
  Tournament tournament = 1;
}

message ListTournamentsRequest {
  string namespace = 1;
  int32 limit = 2;
  int32 offset = 3;
  TournamentStatus status = 4;
  google.protobuf.Timestamp start_date_from = 5;
  google.protobuf.Timestamp start_date_to = 6;
}

message ListTournamentsResponse {
  repeated Tournament tournaments = 1;
  int32 total_count = 2;
}

message GetTournamentRequest {
  string namespace = 1;
  string tournament_id = 2;
}

message GetTournamentResponse {
  Tournament tournament = 1;
}

message StartTournamentRequest {
  string namespace = 1;
  string tournament_id = 2;
}

message StartTournamentResponse {
  Tournament tournament = 1;
}

message CancelTournamentRequest {
  string namespace = 1;
  string tournament_id = 2;
}

message CancelTournamentResponse {
  Tournament tournament = 1;
}

message RegisterForTournamentRequest {
  string namespace = 1 [(google.api.field_behavior) = REQUIRED];
  string tournament_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message RegisterForTournamentResponse {
  string participant_id = 1 [(google.api.field_behavior) = REQUIRED];
  string tournament_id = 2 [(google.api.field_behavior) = REQUIRED];
  string user_id = 3 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp registered_at = 4 [(google.api.field_behavior) = REQUIRED];
}

message GetTournamentParticipantsRequest {
  string namespace = 1 [(google.api.field_behavior) = REQUIRED];
  string tournament_id = 2 [(google.api.field_behavior) = REQUIRED];
  int32 page_size = 3 [(google.api.field_behavior) = OPTIONAL];
  string page_token = 4 [(google.api.field_behavior) = OPTIONAL];
}

message GetTournamentParticipantsResponse {
  repeated Participant participants = 1 [(google.api.field_behavior) = REQUIRED];
  int32 total_participants = 2 [(google.api.field_behavior) = REQUIRED];
  string next_page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

message RemoveParticipantRequest {
  string namespace = 1 [(google.api.field_behavior) = REQUIRED];
  string tournament_id = 2 [(google.api.field_behavior) = REQUIRED];
  string user_id = 3 [(google.api.field_behavior) = REQUIRED];
}

message RemoveParticipantResponse {
  string tournament_id = 1 [(google.api.field_behavior) = REQUIRED];
  string user_id = 2 [(google.api.field_behavior) = REQUIRED];
  bool removed = 3 [(google.api.field_behavior) = REQUIRED];
}

service TournamentService {

  rpc CreateTournament (CreateTournamentRequest) returns (CreateTournamentResponse) {
    // Admin permission required: CREATE on ADMIN:NAMESPACE:{namespace}:TOURNAMENT
    option (permission.action) = CREATE;
    option (permission.resource) = "ADMIN:NAMESPACE:{namespace}:TOURNAMENT";
    option (google.api.http) = {
      post: "/v1/admin/namespace/{namespace}/tournaments"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create Tournament"
      description: "Create a new tournament with specified configuration"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
        security_requirement: {
          key: "ServiceToken"
          value: {}
        }
      }
    };
  }

  rpc ListTournaments (ListTournamentsRequest) returns (ListTournamentsResponse) {
    // Public read permission: READ on NAMESPACE:{namespace}:TOURNAMENT
    option (permission.action) = READ;
    option (permission.resource) = "NAMESPACE:{namespace}:TOURNAMENT";
    option (google.api.http) = {
      get: "/v1/public/namespace/{namespace}/tournaments"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Tournaments"
      description: "List tournaments with optional filtering by status and date range"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
        security_requirement: {
          key: "ServiceToken"
          value: {}
        }
      }
    };
  }

  rpc GetTournament (GetTournamentRequest) returns (GetTournamentResponse) {
    // Public read permission: READ on NAMESPACE:{namespace}:TOURNAMENT
    option (permission.action) = READ;
    option (permission.resource) = "NAMESPACE:{namespace}:TOURNAMENT";
    option (google.api.http) = {
      get: "/v1/public/namespace/{namespace}/tournaments/{tournament_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get Tournament"
      description: "Get tournament details by tournament ID"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
        security_requirement: {
          key: "ServiceToken"
          value: {}
        }
      }
    };
  }

  rpc StartTournament (StartTournamentRequest) returns (StartTournamentResponse) {
    // Admin permission required: UPDATE on ADMIN:NAMESPACE:{namespace}:TOURNAMENT
    option (permission.action) = UPDATE;
    option (permission.resource) = "ADMIN:NAMESPACE:{namespace}:TOURNAMENT";
    option (google.api.http) = {
      post: "/v1/admin/namespace/{namespace}/tournaments/{tournament_id}/start"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Start Tournament"
      description: "Start a tournament to generate brackets and begin competition"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
        security_requirement: {
          key: "ServiceToken"
          value: {}
        }
      }
    };
  }

  rpc CancelTournament (CancelTournamentRequest) returns (CancelTournamentResponse) {
    // Admin permission required: UPDATE on ADMIN:NAMESPACE:{namespace}:TOURNAMENT
    option (permission.action) = UPDATE;
    option (permission.resource) = "ADMIN:NAMESPACE:{namespace}:TOURNAMENT";
    option (google.api.http) = {
      post: "/v1/admin/namespace/{namespace}/tournaments/{tournament_id}/cancel"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Cancel Tournament"
      description: "Cancel a tournament and prevent further participation"
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
        security_requirement: {
          key: "ServiceToken"
          value: {}
        }
      }
    };
  }
}

// OpenAPI options for the entire API.
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Tournament API";
    version: "1.0";
  };
  base_path: "/tournament";

  security_definitions: {
    security: {
      key: "Bearer";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
        description: "User Bearer token for authentication (from AccelByte IAM)";
      }
    }
    security: {
      key: "ServiceToken";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "X-Service-Token";
        description: "Service token for game server authentication";
      }
    }
  };
};